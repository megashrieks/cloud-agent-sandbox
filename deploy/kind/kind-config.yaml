# kind cluster for local development.
#
# gVisor note: running gVisor inside kind requires the runsc shim in the node
# image (kind nodes are containers). For pure local iteration you can omit the
# RuntimeClass (set SANDBOX_RUNTIME_CLASS="") to fall back to the hardened
# baseline runtime, then move to a gVisor/Kata-capable cluster for real
# isolation. See docs/local-dev.md.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sandbox-dev
nodes:
  - role: control-plane
    # Enforce a per-pod PID cap at the kubelet level. Kubernetes has no per-pod
    # PID field in the PodSpec; podPidsLimit is the node-level control that stops
    # a fork bomb in one sandbox from exhausting the node's PID space and DoSing
    # neighbours. Prod clusters must set the same on their node kubelet config.
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        podPidsLimit: 512
    extraMounts:
      # Ship the hardened seccomp profile (RuntimeDefault minus io_uring) to the
      # node's kubelet seccomp root so pods can reference it as a Localhost
      # profile: LocalhostProfile "profiles/sandbox-seccomp.json". Prod clusters
      # distribute this file via a DaemonSet or node image instead.
      - hostPath: ./deploy/seccomp
        containerPath: /var/lib/kubelet/seccomp/profiles
    extraPortMappings:
      # Expose the orchestrator (NodePort or port-forward is also fine).
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
networking:
  # A CNI that enforces NetworkPolicy is required for egress containment.
  # kind's default kindnet does NOT enforce NetworkPolicy, so we disable it and
  # install Calico (see deploy/kind/install-calico.sh / docs/local-dev.md), which
  # enforces the closed-network guarantee in 20-networkpolicy-sandbox.yaml.
  disableDefaultCNI: true
  # Calico's default IP pool is 192.168.0.0/16; match it here.
  podSubnet: "192.168.0.0/16"
