# MITM proxy pool (pool-per-group topology). Each replica is an interception
# proxy that injects credentials for approved hosts. TOKENS live ONLY here,
# configured by the user (edit proxy/addons/inject.py or mount a secret).
#
# The orchestrator assigns sandboxes to a proxy instance and injects that
# instance's address as HTTPS_PROXY plus the proxy CA cert into the sandbox.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mitmproxy
  namespace: sandboxes
  labels:
    app: mitmproxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mitmproxy
  template:
    metadata:
      labels:
        app: mitmproxy
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mitmproxy
          image: ghcr.io/megashrieks/sandbox-mitmproxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: proxy
          env:
            # Users supply tokens here (or via a mounted secret referenced by
            # the addon). These are the ONLY place real credentials exist.
            #
            # Option A: static PAT, set the github-token key on mitmproxy-tokens.
            # Option B: GitHub App, set app-id (+ optional installation-id) and
            #           mount the App private key (see the volume below). Leave
            #           github-token unset when using an App.
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mitmproxy-tokens
                  key: github-token
                  optional: true
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mitmproxy-tokens
                  key: gitlab-token
                  optional: true
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: mitmproxy-tokens
                  key: github-app-id
                  optional: true
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: mitmproxy-tokens
                  key: github-app-installation-id
                  optional: true
            # Path to the mounted GitHub App private key PEM (see volume below).
            - name: GITHUB_APP_PRIVATE_KEY_FILE
              value: /run/secrets/github-app/private-key.pem
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            # Shared CA (cert + key) so every replica impersonates upstreams
            # with the SAME CA that the orchestrator injects into sandboxes.
            # Provisioned by the orchestrator's EnsureCASecret at startup.
            - name: ca
              mountPath: /home/mitmproxy/.mitmproxy
              readOnly: true
            # GitHub App private key (only used when App auth is configured).
            - name: github-app-key
              mountPath: /run/secrets/github-app
              readOnly: true
      volumes:
        - name: ca
          secret:
            secretName: mitmproxy-ca
        - name: github-app-key
          secret:
            # Create with: kubectl -n sandboxes create secret generic \
            #   github-app-key --from-file=private-key.pem=/path/to/app.private-key.pem
            secretName: github-app-key
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: mitmproxy
  namespace: sandboxes
  labels:
    app: mitmproxy
spec:
  selector:
    app: mitmproxy
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
