# RBAC for the orchestrator: it manages sandbox pods, PVCs, and their CA
# secrets, and it execs into pods. Scoped to the sandboxes namespace only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator
  namespace: sandboxes
rules:
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # pods/exec is how the orchestrator runs shell + file operations in sandboxes.
  - apiGroups: [""]
    resources: ["pods/exec", "pods/attach"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator
  namespace: sandboxes
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: sandboxes
roleRef:
  kind: Role
  name: orchestrator
  apiGroup: rbac.authorization.k8s.io
